version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      all-server-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/client"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      all-client-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
