name: Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        env:
          HEALTH_URL: ${{ secrets.PROD_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "PROD_HEALTH_URL is not set" >&2
            exit 1
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" "$HEALTH_URL")
          test "$code" = "200"

      - name: Check homepage
        env:
          APP_URL: ${{ secrets.PROD_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "PROD_APP_URL is not set" >&2
            exit 1
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" "$APP_URL")
          test "$code" = "200"
