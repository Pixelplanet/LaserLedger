name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client install

      - name: Typecheck
        run: npm run typecheck

      - name: Audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t pixelplanet/laserledger:${{ github.sha }} .

  test-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: laserledger_test
          MYSQL_USER: laserledger
          MYSQL_PASSWORD: laserledger
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u laserledger -plaserledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: laserledger_test
      DB_USER: laserledger
      DB_PASSWORD: laserledger
      APP_BASE_URL: http://localhost:5173
      JWT_SECRET: ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test_mysql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests against MySQL
        run: npm run test:mysql

  docker-publish:
    needs: [test-and-build, test-mysql]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            pixelplanet/laserledger:latest
            pixelplanet/laserledger:${{ github.sha }}

  deploy-test:
    needs: [docker-publish]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy test stack via Portainer
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          STACK_NAME: lasertools-test
        run: |
          set -euo pipefail

          # Find the endpoint ID
          ENDPOINT_ID=$(curl -sfS "$PORTAINER_URL/api/endpoints" \
            -H "X-API-Key: $PORTAINER_API_KEY" | jq '.[0].Id')
          echo "Endpoint ID: $ENDPOINT_ID"

          # Find the test stack by name
          STACK_JSON=$(curl -sfS "$PORTAINER_URL/api/stacks" \
            -H "X-API-Key: $PORTAINER_API_KEY" | jq --arg name "$STACK_NAME" '.[] | select(.Name == $name)')

          STACK_ID=$(echo "$STACK_JSON" | jq '.Id')
          echo "Stack ID: $STACK_ID"

          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "::error::Stack '$STACK_NAME' not found in Portainer"
            exit 1
          fi

          # Get current stack details (compose file + env vars)
          STACK_DETAIL=$(curl -sfS "$PORTAINER_URL/api/stacks/$STACK_ID" \
            -H "X-API-Key: $PORTAINER_API_KEY")

          STACK_FILE=$(echo "$STACK_DETAIL" | jq -r '.StackFileContent')
          STACK_ENV=$(echo "$STACK_DETAIL" | jq '.Env')

          # Redeploy with pullImage to get the new image
          curl -sfS -X PUT "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg file "$STACK_FILE" \
              --argjson env "$STACK_ENV" \
              '{stackFileContent: $file, env: $env, prune: false, pullImage: true}')" \
            -o /dev/null -w "HTTP %{http_code}\n"

          echo "Test stack '$STACK_NAME' redeployed successfully"
