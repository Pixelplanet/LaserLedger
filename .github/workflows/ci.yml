name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client install

      - name: Typecheck
        run: npm run typecheck

      - name: Audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t pixelplanet/laserledger:${{ github.sha }} .

  test-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: laserledger_test
          MYSQL_USER: laserledger
          MYSQL_PASSWORD: laserledger
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u laserledger -plaserledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: laserledger_test
      DB_USER: laserledger
      DB_PASSWORD: laserledger
      APP_BASE_URL: http://localhost:5173
      JWT_SECRET: ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test_mysql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests against MySQL
        run: npm run test:mysql

  docker-publish:
    needs: [test-and-build, test-mysql]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            pixelplanet/laserledger:latest
            pixelplanet/laserledger:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-test:
    needs: [docker-publish]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy lasertools_test stack via Portainer
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          STACK_NAME: lasertools_test
        run: |
          set -euo pipefail
          PORTAINER_URL="${PORTAINER_URL%/}"

          api() {
            local method=$1 path=$2; shift 2
            local url="$PORTAINER_URL/api$path"
            echo ">> $method $url" >&2
            local response http_code
            response=$(curl -sS -w "\n%{http_code}" -X "$method" "$url" \
              -H "X-API-Key: $PORTAINER_API_KEY" "$@")
            http_code=$(echo "$response" | tail -1)
            response=$(echo "$response" | sed '$d')
            if [ "$http_code" -ge 400 ]; then
              echo "::error::HTTP $http_code from $method $url" >&2
              echo "Response body: $response" >&2
              return 1
            fi
            echo "$response"
          }

          # Find endpoint and stack IDs
          EID=$(api GET /endpoints | jq '.[0].Id')
          echo "Endpoint ID: $EID"

          STACK_ID=$(api GET /stacks | jq -r --arg name "$STACK_NAME" '.[] | select(.Name == $name) | .Id' | head -n 1)
          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "::error::Stack '$STACK_NAME' not found"
            api GET /stacks | jq -r '.[].Name' >&2 || true
            exit 1
          fi
          echo "Stack ID: $STACK_ID"

          # Preferred path for git-backed stacks.
          REDEPLOY_URL="$PORTAINER_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$EID"
          REDEPLOY_RAW=$(curl -sS -w "\n%{http_code}" -X PUT "$REDEPLOY_URL" \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          REDEPLOY_CODE=$(echo "$REDEPLOY_RAW" | tail -1)
          REDEPLOY_BODY=$(echo "$REDEPLOY_RAW" | sed '$d')

          if [ "$REDEPLOY_CODE" -lt 400 ]; then
            echo "Stack '$STACK_NAME' git redeploy triggered successfully"
            exit 0
          fi

          echo "Git redeploy failed with HTTP $REDEPLOY_CODE" >&2
          echo "Git redeploy body: $REDEPLOY_BODY" >&2

          # Fallback: update stack from current stack file in Portainer and force image pull.
          if echo "$REDEPLOY_BODY" | grep -qi "authentication required\|repository not found\|Unable get latest commit id"; then
            echo "Falling back to stack update using current Portainer stack file..." >&2

            STACK_META=$(api GET "/stacks/$STACK_ID")
            STACK_ENV=$(echo "$STACK_META" | jq '.Env // []')
            STACK_FILE_RAW=$(api GET "/stacks/$STACK_ID/file")
            STACK_FILE=$(echo "$STACK_FILE_RAW" | jq -r '.StackFileContent // .stackFileContent // empty' 2>/dev/null || true)
            if [ -z "$STACK_FILE" ]; then
              STACK_FILE="$STACK_FILE_RAW"
            fi

            BODY=$(jq -n \
              --arg file "$STACK_FILE" \
              --argjson env "$STACK_ENV" \
              '{stackFileContent: $file, env: $env, prune: false, pullImage: true}')

            api PUT "/stacks/$STACK_ID?endpointId=$EID" \
              -H "Content-Type: application/json" \
              -d "$BODY" > /dev/null

            echo "Stack '$STACK_NAME' redeployed via stack update fallback"
            exit 0
          fi

          echo "::error::Stack redeploy failed and no fallback condition matched" >&2
          exit 1
