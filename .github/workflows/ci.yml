name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client install

      - name: Typecheck
        run: npm run typecheck

      - name: Audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t pixelplanet/laserledger:${{ github.sha }} .

  test-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: laserledger_test
          MYSQL_USER: laserledger
          MYSQL_PASSWORD: laserledger
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u laserledger -plaserledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: laserledger_test
      DB_USER: laserledger
      DB_PASSWORD: laserledger
      APP_BASE_URL: http://localhost:5173
      JWT_SECRET: ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test_mysql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests against MySQL
        run: npm run test:mysql

  docker-publish:
    needs: [test-and-build, test-mysql]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            pixelplanet/laserledger:latest
            pixelplanet/laserledger:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-test:
    needs: [docker-publish]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy laserledger-test via Portainer
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          IMAGE: pixelplanet/laserledger:latest
          CONTAINER_NAME: laserledger-test
        run: |
          set -euo pipefail
          PORTAINER_URL="${PORTAINER_URL%/}"

          api() {
            local method=$1 path=$2; shift 2
            local url="$PORTAINER_URL/api$path"
            echo ">> $method $url" >&2
            local response http_code
            response=$(curl -sS -w "\n%{http_code}" -X "$method" "$url" \
              -H "X-API-Key: $PORTAINER_API_KEY" "$@")
            http_code=$(echo "$response" | tail -1)
            response=$(echo "$response" | sed '$d')
            if [ "$http_code" -ge 400 ]; then
              echo "::error::HTTP $http_code from $method $url" >&2
              echo "Response body: $response" >&2
              return 1
            fi
            echo "$response"
          }

          # Find the endpoint ID
          EID=$(api GET /endpoints | jq '.[0].Id')
          echo "Endpoint ID: $EID"
          DOCKER="/endpoints/$EID/docker"

          # Pull the latest image
          echo "Pulling $IMAGE..."
          api POST "$DOCKER/images/create?fromImage=${IMAGE%%:*}&tag=${IMAGE##*:}" \
            > /dev/null

          # Find the running container by name
          CONTAINER_ID=$(api GET "$DOCKER/containers/json?all=true" \
            | jq -r --arg name "/$CONTAINER_NAME" \
              '.[] | select(.Names[] == $name) | .Id')

          if [ -z "$CONTAINER_ID" ]; then
            echo "::error::Container '$CONTAINER_NAME' not found"
            exit 1
          fi
          echo "Container: $CONTAINER_ID"

          # Get current container config for recreation
          INSPECT=$(api GET "$DOCKER/containers/$CONTAINER_ID/json")

          # Stop and remove old container
          echo "Stopping $CONTAINER_NAME..."
          api POST "$DOCKER/containers/$CONTAINER_ID/stop" > /dev/null 2>&1 || true
          api DELETE "$DOCKER/containers/$CONTAINER_ID" > /dev/null

          # Recreate with same config but new image
          CREATE_BODY=$(echo "$INSPECT" | jq --arg img "$IMAGE" '{
            Image: $img,
            Env: .Config.Env,
            ExposedPorts: .Config.ExposedPorts,
            Labels: .Config.Labels,
            Volumes: .Config.Volumes,
            HostConfig: .HostConfig,
            NetworkingConfig: {
              EndpointsConfig: .NetworkSettings.Networks
            },
            Healthcheck: .Config.Healthcheck
          }')
          TMPBODY=$(mktemp)
          echo "$CREATE_BODY" > "$TMPBODY"

          NEW_ID=$(api POST "$DOCKER/containers/create?name=$CONTAINER_NAME" \
            -H "Content-Type: application/json" -d @"$TMPBODY" | jq -r '.Id')
          rm -f "$TMPBODY"
          echo "Created: $NEW_ID"

          # Start the new container
          api POST "$DOCKER/containers/$NEW_ID/start" > /dev/null
          echo "Container '$CONTAINER_NAME' redeployed successfully"
