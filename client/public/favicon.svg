<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="LaserLedger">
  <defs>
    <linearGradient id="ll-tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2316"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="ll-accent" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#ll-tile)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#f59e0b" stroke-opacity="0.18" stroke-width="1"/>
  <!-- ledger page -->
  <rect x="15" y="13" width="34" height="38" rx="5" fill="none" stroke="url(#ll-accent)" stroke-width="3"/>
  <line x1="22" y1="24" x2="42" y2="24" stroke="url(#ll-accent)" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="22" y1="32" x2="42" y2="32" stroke="url(#ll-accent)" stroke-width="2.6" stroke-linecap="round" opacity="0.75"/>
  <line x1="22" y1="40" x2="34" y2="40" stroke="url(#ll-accent)" stroke-width="2.6" stroke-linecap="round" opacity="0.55"/>
  <!-- laser dot marking the ledger -->
  <circle cx="44" cy="40" r="4" fill="#fff7e0"/>
  <circle cx="44" cy="40" r="1.8" fill="#f59e0b"/>
</svg>
